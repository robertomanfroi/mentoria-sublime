services:
  - type: web
    name: mentoria-sublime
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://mentoria-sublime.onrender.com
      - key: CORS_ORIGIN
        value: https://mentoria-sublime.onrender.com
      - key: TURSO_DATABASE_URL
        value: libsql://mentoria-sublime-robertomanfroi.aws-us-east-1.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false
    disk:
      name: mentoria-data
      mountPath: /app/data
      sizeGB: 1
