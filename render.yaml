services:
  - type: web
    name: mentoria-sublime
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: mentoria-data
      mountPath: /app/data
      sizeGB: 1
